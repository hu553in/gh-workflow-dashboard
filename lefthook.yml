output:
  - execution
  - failure

pre-commit:
  jobs:
    - name: prettier
      run: pnpm exec prettier -u --write {staged_files}
      stage_fixed: true

    - name: eslint
      glob: '*.js'
      run: pnpm exec eslint --max-warnings=0 --fix {staged_files}
      stage_fixed: true

    - name: stylelint
      glob: '**/*.css'
      run: pnpm exec stylelint --max-warnings=0 --fix {staged_files}
      stage_fixed: true

check:
  jobs:
    - name: eslint
      run: pnpm exec eslint . --max-warnings=0

    - name: stylelint
      run: pnpm exec stylelint "**/*.css" --max-warnings=0

check-fix:
  jobs:
    - name: prettier
      run: pnpm exec prettier -u --write .

    - name: eslint
      run: pnpm exec eslint . --max-warnings=0 --fix

    - name: stylelint
      run: pnpm exec stylelint "**/*.css" --max-warnings=0 --fix
